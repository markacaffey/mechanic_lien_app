<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register New Dealer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg rounded-4">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">🚗 Register New Dealer Account</h4>
                </div>

                <div class="card-body">
                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">PNumber (Account #)</label>
                            <input type="text" name="pnumber" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Account Role</label>
                           <input type="hidden" name="role" value="dealer">

                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Create Account</button>
                        </div>

                    </form>
                </div>

                <div class="card-footer text-muted text-center small">
                    Only admin should create accounts for dealers.
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
